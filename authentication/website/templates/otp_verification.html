<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <title>OTP Verification</title>
</head>
<body>
<div class="modal">
    <div class="modal-content">
        <form method="post">
            <span class="close">&times;</span>
            <h2>OTP Verification</h2>
            <p>A One-Time Password (OTP) has been sent to your mobile number.</p>
            <input type="text" id="otpInput" placeholder="Enter OTP" name="otp">
            <button id="verifyBtn" type="submit">Verify</button>
            <button id="resendBtn" type="submit" formaction="/resend_otp">Resend</button>

            <p id="countdown">1:00</p>
            <p id="timeoutMessage" class="hidden">Time's up, please resend the OTP</p>


        </form>
    </div>
</div>
<script>




document.addEventListener("DOMContentLoaded", function() {
    // Set the initial time in seconds
    let timeLeft = 60;

    // Function to update the countdown display
    // Update the updateCountdown function
function updateCountdown() {
    const countdownElement = document.getElementById("countdown");
    const timeoutMessage = document.getElementById("timeoutMessage");

    if (timeLeft > 0) {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        countdownElement.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        timeoutMessage.classList.add("hidden"); // Hide the message
    } else {
        countdownElement.textContent = ""; // Clear the countdown text
        countdownElement.style.display = "none"; // Hide the countdown
        timeoutMessage.classList.remove("hidden"); // Show the message
    }
}




    // Function to decrement the time and update the display
    function decrementTime() {
        if (timeLeft > 0) {
            timeLeft--;
            updateCountdown();
        }
    }

    // Initial update of countdown
    updateCountdown();

    // Start the countdown timer
    const countdownInterval = setInterval(decrementTime, 1000);

    // Clear the interval when the countdown reaches zero
    setTimeout(function() {
        clearInterval(countdownInterval);
    }, (timeLeft + 1) * 1000); // Add 1 second to account for updating the display after 0:00
});

</script>
</body>
</html>
