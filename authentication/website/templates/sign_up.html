{% extends "base.html" %} {%block title%}Sign Up{%endblock%}
{%block content%}
<form method="POST">
    <h3 align="center">Sign Up</h3>
    <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="Enter email"/>
    </div>
    <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" class="form-control" id="firstName" name="firstName" placeholder="Enter first name"/>
    </div>
    <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Enter Last name"/>
    </div>
    <div class="form-group">
        <label for="lastName">Mobile No</label>
        <input type="number" class="form-control" id="phone no" name="mobile_no" placeholder="Enter Last name"/>
    </div>
    <div class="form-group">
        <label for="password1">Password</label>
        <input type="password" class="form-control" id="password1" name="password1" placeholder="Enter password"/>
    </div>
    <div class="form-group">
        <label for="passwordCon">Confirm Password</label>
        <input type="password" class="form-control" id="passwordCon" name="passwordCon" placeholder="Confirm password"/>
    </div>
    <br/>
    <button type="submit" class="btn btn-primary">Next</button>
</form>
{% endblock %}
